<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表达式计算器 | 你的工具箱</title>
    <meta
      name="description"
      content="支持括号、小数、回车求值与本地历史记录的表达式计算器。中文界面、键盘友好、移动端可用。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./site.js"></script>
    <script defer src="./calculator.js"></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header fade-up">
        <a class="brand" href="./index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">你的工具箱</span>
        </a>
        <nav class="main-nav" aria-label="主导航">
          <a href="./index.html">首页</a>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换主题"></button>
        </nav>
      </header>

      <main class="main-content">
        <section class="page-intro fade-up fade-delay-1">
          <p class="page-kicker">Tool 01</p>
          <h1>表达式计算器</h1>
          <p>支持键盘输入、括号、小数、清空、回退和最近历史记录。默认服务最常见的日常快算场景。</p>
        </section>

        <section class="calculator-layout fade-up fade-delay-2">
          <div class="calculator-panel">
            <label class="sr-only" for="expression">输入表达式</label>
            <div class="calc-screen">
              <textarea
                id="expression"
                class="expression-input"
                data-expression
                spellcheck="false"
                placeholder="例如：1 + (2 * 3.5)"
              ></textarea>
              <div class="result-row">
                <span class="result-label">Result</span>
                <output class="result-value" data-result>0</output>
              </div>
            </div>

            <div class="calc-actions" data-keypad aria-label="计算器按键">
              <button class="calc-key" type="button" data-action="clear" data-value="" data-kind="action">AC</button>
              <button class="calc-key" type="button" data-value="(" data-kind="operator">(</button>
              <button class="calc-key" type="button" data-value=")" data-kind="operator">)</button>
              <button class="calc-key" type="button" data-value="/" data-kind="operator">/</button>

              <button class="calc-key" type="button" data-value="7">7</button>
              <button class="calc-key" type="button" data-value="8">8</button>
              <button class="calc-key" type="button" data-value="9">9</button>
              <button class="calc-key" type="button" data-value="*" data-kind="operator">*</button>

              <button class="calc-key" type="button" data-value="4">4</button>
              <button class="calc-key" type="button" data-value="5">5</button>
              <button class="calc-key" type="button" data-value="6">6</button>
              <button class="calc-key" type="button" data-value="-" data-kind="operator">-</button>

              <button class="calc-key" type="button" data-value="1">1</button>
              <button class="calc-key" type="button" data-value="2">2</button>
              <button class="calc-key" type="button" data-value="3">3</button>
              <button class="calc-key" type="button" data-value="+" data-kind="operator">+</button>

              <button class="calc-key" type="button" data-value="0">0</button>
              <button class="calc-key" type="button" data-value=".">.</button>
              <button class="calc-key" type="button" data-action="backspace" data-value="" data-kind="action">←</button>
              <button class="calc-key equal-key" type="button" data-action="evaluate" data-value="" data-kind="action">=</button>
            </div>

            <div class="shortcut-bar" aria-label="快捷键说明">
              <span>Enter 计算</span>
              <span>Backspace 删除</span>
              <span>Esc 清空</span>
            </div>
          </div>

          <aside class="history-panel">
            <div class="history-head">
              <h2>最近记录</h2>
              <button class="history-clear" type="button" data-clear-history>清空</button>
            </div>
            <ul class="history-list" data-history-list></ul>
          </aside>
        </section>

        <section class="usage-note fade-up fade-delay-3">
          <h2>使用说明</h2>
          <ul>
            <li>当前版本只支持基础表达式：数字、小数点、括号与四则运算符。</li>
            <li>按 Enter 可以直接计算并写入历史记录，点击历史项可回填表达式。</li>
            <li>如果结果提示错误，请优先检查括号是否闭合、是否存在连续运算符或除零。</li>
          </ul>
        </section>
      </main>

      <footer class="site-footer">
        <p>© 2026 你的工具箱</p>
        <p>先把一个工具做好，再继续扩展</p>
      </footer>
    </div>
  </body>
</html>
